<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Galaxy S26 Showcase</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&display=swap" rel="stylesheet">
    <script>
        // Security Guard
        if (sessionStorage.getItem('isAdmin') !== 'true') {
            window.location.href = 'admin_login.html';
        }
    </script>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0A0A0A;
            --primary: #0055FF;
            --danger: #FF3B30;
            --border: rgba(255, 255, 255, 0.1);
            --text-white: #FFFFFF;
            --text-gray: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text-white);
            font-family: 'Pretendard Variable', sans-serif;
            min-height: 100vh;
        }

        .navbar {
            padding: 20px 40px;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 1.5rem;
            letter-spacing: -1px;
        }

        .nav-brand span { color: var(--primary); }

        .btn-logout {
            background: transparent;
            color: var(--text-gray);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        .main-content {
            padding: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .stats-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 40px;
            display: inline-block;
            min-width: 200px;
        }

        .stats-card label {
            display: block;
            color: var(--text-gray);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        .stats-card .count {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 2.5rem;
            color: var(--primary);
        }

        .table-container {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background: #111;
            padding: 20px;
            color: var(--text-gray);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }

        tr:last-child td { border-bottom: none; }

        .tag {
            padding: 4px 10px;
            background: #1a1a1a;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .tag.carrier { color: #00D1FF; border-color: rgba(0, 209, 255, 0.2); }
        .tag.model { color: #FFD100; border-color: rgba(255, 209, 0, 0.2); }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-gray);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: var(--danger);
            border-color: var(--danger);
            color: #FFF;
        }

        .btn-clear {
            background: var(--danger);
            color: #FFF;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        .btn-refresh {
            background: var(--primary);
            color: #FFF;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            margin-right: 10px;
            transition: opacity 0.3s ease;
        }

        .btn-clear:hover, .btn-refresh:hover {
            opacity: 0.8;
        }

        .empty-state {
            padding: 100px;
            text-align: center;
            color: var(--text-gray);
        }

        /* Custom Confirmation Modal */
        #confirmModal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #confirmModal.active {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #confirmModal.active .modal-card {
            transform: scale(1);
        }

        .modal-card h3 {
            font-size: 1.25rem;
            margin-bottom: 12px;
        }

        .modal-card p {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .modal-actions button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: #1a1a1a;
            color: var(--text-white);
            border: 1px solid var(--border) !important;
        }

        .btn-confirm {
            background: var(--danger);
            color: #FFF;
        }

        .btn-cancel:hover { background: #222; }
        .btn-confirm:hover { background: #E03126; transform: translateY(-2px); }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-brand">GALAXY <span>ADMIN</span></div>
        <button onclick="logout()" class="btn-logout">LOGOUT</button>
    </nav>

    <main class="main-content">
        <div class="header-flex">
            <div>
                <div class="stats-card">
                    <label>TOTAL APPLICATIONS</label>
                    <div id="totalLeads" class="count">0</div>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="refreshLeads()" class="btn-refresh">REFRESH DATA</button>
                <button onclick="clearAllLeads()" class="btn-clear">CLEAR ALL DATA</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>SUBMISSION DATE</th>
                        <th>NAME</th>
                        <th>PHONE</th>
                        <th>MODEL</th>
                        <th>CARRIER</th>
                        <th>ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="leadsTableBody">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                <p>접수된 상담 신청이 없습니다.</p>
            </div>
        </div>
    </main>

    <!-- Custom Confirmation Modal -->
    <div id="confirmModal">
        <div class="modal-card">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage">Are you sure you want to perform this action?</p>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-cancel">취소</button>
                <button id="modalConfirmBtn" class="btn-confirm">승인</button>
            </div>
        </div>
    </div>
    <!-- Firebase SDK (v8 Compat for static HTML) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="/firebase_config.js"></script>

    <script src="/admin_logic.js"></script>
</body>
</html>
